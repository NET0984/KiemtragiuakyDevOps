services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: devops_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devops_db
      MYSQL_USER: devops_user
      MYSQL_PASSWORD: devops_pass
    ports:
      - "3309:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - devops_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend (Flask)
  backend:
    build: ./backend
    container_name: devops_backend
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: devops_db
      APP_NAME: DevOps Mini Project
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - devops_network
    restart: unless-stopped

  # Frontend (Web Server)
  frontend:
    build: ./frontend
    container_name: devops_frontend
    ports:
      - "8081:8080"
    depends_on:
      - backend
    networks:
      - devops_network
    restart: unless-stopped

volumes:
  db_data:

networks:
  devops_network:
    driver: bridge
